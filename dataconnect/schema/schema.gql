type User @table {
  displayName: String!
  email: String!
  createdAt: Timestamp!
  photoUrl: String
  lastLogin: Timestamp
}

type AITool @table {
  name: String!
  description: String!
  category: String!
  createdAt: Timestamp!
  usageInstructions: String
  pricingModel: String
}

type SubscriptionType @table {
  name: String!
  price: Float!
  features: String!
  createdAt: Timestamp!
  monthlyCredits: Int
  allowedTools: String
}

type UserSubscription @table {
  user: User!
  subscriptionType: SubscriptionType!
  startDate: Date!
  endDate: Date!
  status: String!
  createdAt: Timestamp!
  paymentMethod: String
  renewalDate: Date
}

type UsageRecord @table {
  user: User!
  aiTool: AITool!
  usageDate: Date!
  usageQuantity: Int!
  createdAt: Timestamp!
  details: String
}